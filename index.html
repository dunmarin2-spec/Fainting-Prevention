        /* 💡 필기체 스타일을 위한 폰트 추가 */
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap');

        :root { --matrix-green: #39ff14; --neon-red: #ff003c; --gold: #ffd700; --coupang-blue: #0073e9; --coupang-red: #e52528; --bg-color: #0a0a0c; --kakao-yellow: #fee500; }
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); font-weight: normal; font-style: normal; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'DungGeunMo', sans-serif; background: var(--bg-color); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow: hidden; transition: background 0.1s; }
        body.alarm-on { animation: bloody-flash 0.5s infinite; }

        /* 💡 찬둥의 필기체 시그니처 스타일 */
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 20px; color: var(--matrix-green); transform: rotate(-10deg); margin-bottom: -15px; margin-left: -60px; z-index: 100; opacity: 0.9; }

        /* 타이틀 위치 및 크기 최적화 */
        .app-title { position: relative; margin-top: 20px; font-size: 1.3rem; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* 레이더 박스 */
        .radar-box { position: relative; width: 210px; height: 210px; border-radius: 50%; border: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; background: repeating-radial-gradient(circle, #0a0a0c 0, #0a0a0c 20px, #1a1a1c 21px, #0a0a0c 22px); margin: 20px 0; transition: 0.3s; }
        .radar-box::before { content: ''; position: absolute; top: 0; left: 50%; width: 50%; height: 50%; background: linear-gradient(90deg, rgba(57,255,20,0.15) 0%, transparent 100%); transform-origin: bottom left; animation: radar-spin 2s linear infinite; display: none; }
        .radar-box.tracking::before { display: block; }
        
        .status-title { font-size: 0.9rem; color: #888; z-index: 10; margin-bottom: 5px; }
        .distance-display { font-size: 2.5rem; color: #fff; font-weight: bold; text-shadow: 0 0 20px rgba(255,255,255,0.3); z-index: 10; transition: 0.3s; }
        .distance-display.active { color: var(--matrix-green); font-size: 3rem; }

        .control-panel { width: 85%; max-width: 350px; display: flex; flex-direction: column; gap: 8px; z-index: 20; }
        
        input[type="text"] { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #333; background: #1a1a1c; color: #fff; font-size: 1rem; font-family: 'DungGeunMo'; text-align: center; box-sizing: border-box; outline: none; transition: 0.2s; }
        input[type="text"]:focus { border-color: var(--matrix-green); }
        
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #222; border: 1px solid #444; border-radius: 8px; max-height: 180px; overflow-y: auto; z-index: 99; display: none; margin-top: 5px; }
        .autocomplete-list div { padding: 12px; cursor: pointer; font-size: 1rem; border-bottom: 1px solid #333; }

        .btn { padding: 14px; border: none; border-radius: 12px; font-size: 1.1rem; font-family: 'DungGeunMo'; cursor: pointer; font-weight: bold; transition: 0.1s; width: 100%; }
        .btn-start { background: var(--matrix-green); color: #000; box-shadow: 0 0 15px rgba(57,255,20,0.3); }
        .btn-stop { background: var(--neon-red); color: #fff; display: none; }

        .btn-coffee { background: var(--kakao-yellow); color: #3c1e1e; margin-top: 5px; border: 1px solid #000; font-size: 0.9rem; padding: 10px; }
        .btn-coffee:active { background: #fada0a; }

        .coupang-banner { display: block; margin-top: 5px; background: #fff; border-radius: 12px; padding: 12px; text-align: center; text-decoration: none; border: 2px solid transparent; animation: pulse-border 2s infinite; }
        .coupang-title { color: var(--coupang-red); font-size: 0.75rem; font-weight: bold; margin-bottom: 2px; font-family: sans-serif;}
        .coupang-desc { color: #000; font-size: 0.9rem; line-height: 1.3; font-family: sans-serif; font-weight: bold;}

        @keyframes radar-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes bloody-flash { 0%, 100% { background: var(--bg-color); } 50% { background: #4a0000; } }
        @keyframes pulse-border { 0%, 100% { border-color: var(--coupang-blue); } 50% { border-color: var(--coupang-red); } }
    </style>
</head>

        let audioCtx, sirenInterval, isAlarmPlaying = false;
        const ALARM_DISTANCE = 1000; 

        const searchInput = document.getElementById('searchInput');
        const autocompleteList = document.getElementById('autocompleteList');
        const searchContainer = document.getElementById('searchContainer');
        const distanceText = document.getElementById('distanceText');
        const statusTitle = document.getElementById('statusTitle');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const radarBox = document.getElementById('radarBox');

        searchInput.addEventListener('input', function() {
            const val = this.value.trim();
            autocompleteList.innerHTML = '';
            if (!val) { autocompleteList.style.display = 'none'; return; }
            const matchedStations = stationDB.filter(s => s.name.includes(val));
            if (matchedStations.length > 0) {
                autocompleteList.style.display = 'block';
                matchedStations.forEach(station => {
                    const div = document.createElement('div');
                    div.innerHTML = station.name;
                    div.addEventListener('click', function() {
                        searchInput.value = station.name;
                        targetLat = station.lat; targetLng = station.lng;
                        autocompleteList.style.display = 'none';
                    });
                    autocompleteList.appendChild(div);
                });
            } else { autocompleteList.style.display = 'none'; }
        });

        document.addEventListener('click', function(e) {
            if (e.target !== searchInput) autocompleteList.style.display = 'none';
        });

        function startTracking() {
            if (targetLat === 0 || targetLng === 0) return alert("먼저 지하철역을 검색해서 정확히 선택해주세요!");
            if (!navigator.geolocation) return alert("스마트폰의 위치(GPS) 기능을 켜주세요.");
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            searchContainer.style.display = 'none';
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            radarBox.classList.add('tracking');
            statusTitle.innerText = "GPS 스캔 중...";
            distanceText.classList.add('active');
            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const distance = calculateDistance(position.coords.latitude, position.coords.longitude, targetLat, targetLng);
                    statusTitle.innerText = `${searchInput.value}까지`;
                    distanceText.innerText = distance.toLocaleString() + " m";
                    if (distance <= ALARM_DISTANCE) triggerAlarm();
                },
                (error) => { statusTitle.innerText = "GPS 신호 탐색 중..."; },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3, p1 = lat1 * Math.PI / 180, p2 = lat2 * Math.PI / 180;
            const dp = (lat2 - lat1) * Math.PI / 180, dl = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dp / 2) * Math.sin(dp / 2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) * Math.sin(dl / 2);
            return Math.floor(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))); 
        }

        function triggerAlarm() {
            if (isAlarmPlaying) return;
            isAlarmPlaying = true;
            statusTitle.innerText = "🚨 1km 이내 진입! 기상! 🚨";
            distanceText.style.color = "var(--neon-red)";
            distanceText.style.textShadow = "0 0 20px var(--neon-red)";
            document.body.classList.add('alarm-on');
            radarBox.classList.remove('tracking');
            sirenInterval = setInterval(() => {
                if(!audioCtx) return;
                let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.3); 
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); 
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }, 300); 
        }

        function stopAlarm() {
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            clearInterval(sirenInterval); isAlarmPlaying = false;
            document.body.classList.remove('alarm-on');
            radarBox.classList.remove('tracking');
            distanceText.classList.remove('active');
            distanceText.style.color = "#fff";
            searchContainer.style.display = 'block';
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            searchInput.value = ''; targetLat = 0; targetLng = 0;
            distanceText.innerText = "--- m"; statusTitle.innerText = "남은 거리";
        }
    </script>
</body>
</html>
