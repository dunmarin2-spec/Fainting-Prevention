<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚨 목적지 사수 알람 (실전용)</title>
    <style>
        :root { --matrix-green: #39ff14; --neon-red: #ff003c; --bg-color: #0a0a0c; }
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); font-weight: normal; font-style: normal; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'DungGeunMo', sans-serif; background: var(--bg-color); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; transition: background 0.1s; }
        
        /* 알람 울릴 때 화면 시뻘겋게 깜빡임 */
        body.alarm-on { animation: bloody-flash 0.5s infinite; }

        /* 간지나는 레이더 배경 */
        .radar-box { position: relative; width: 280px; height: 280px; border-radius: 50%; border: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.5); background: repeating-radial-gradient(circle, #0a0a0c 0, #0a0a0c 20px, #1a1a1c 21px, #0a0a0c 22px); margin-bottom: 30px; }
        .radar-box::before { content: ''; position: absolute; top: 0; left: 50%; width: 50%; height: 50%; background: linear-gradient(90deg, rgba(57,255,20,0.1) 0%, transparent 100%); transform-origin: bottom left; animation: radar-spin 2s linear infinite; display: none; }
        .radar-box.tracking::before { display: block; }
        
        .status-title { font-size: 1rem; color: #888; z-index: 10; margin-bottom: 5px; }
        .distance-display { font-size: 3.5rem; color: #fff; font-weight: bold; text-shadow: 0 0 20px rgba(255,255,255,0.3); z-index: 10; }
        .distance-display.active { color: var(--matrix-green); text-shadow: 0 0 20px var(--matrix-green); }

        /* 깔끔해진 입력 UI */
        .control-panel { width: 85%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; z-index: 20; }
        
        select { padding: 18px; border-radius: 12px; border: 2px solid #333; background: #1a1a1c; color: #fff; font-size: 1.2rem; font-family: 'DungGeunMo'; text-align: center; cursor: pointer; appearance: none; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        select:focus { border-color: var(--matrix-green); }

        .btn { padding: 18px; border: none; border-radius: 12px; font-size: 1.3rem; font-family: 'DungGeunMo'; cursor: pointer; font-weight: bold; transition: 0.1s; }
        .btn-start { background: var(--matrix-green); color: #000; box-shadow: 0 0 20px rgba(57,255,20,0.4); }
        .btn-start:active { transform: scale(0.95); background: #2de00b; }
        
        .btn-stop { background: var(--neon-red); color: #fff; display: none; box-shadow: 0 0 20px rgba(255,0,60,0.5); }
        .btn-stop:active { transform: scale(0.95); }

        /* 상단 타이틀 */
        .app-title { position: absolute; top: 40px; font-size: 1.8rem; color: #fff; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        @keyframes radar-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes bloody-flash { 0%, 100% { background: var(--bg-color); } 50% { background: #4a0000; } }
    </style>
</head>
<body>

    <div class="app-title">안심 귀가 알람</div>

    <div class="radar-box" id="radarBox">
        <div class="status-title" id="statusTitle">남은 거리</div>
        <div id="distanceText" class="distance-display">--- m</div>
    </div>

    <div class="control-panel">
        <select id="stationSelect">
            <option value="" disabled selected>내릴 역을 선택하세요</option>
            <option value="37.4979,127.0276">강남역 (2호선)</option>
            <option value="37.5568,126.9245">홍대입구역 (2호선)</option>
            <option value="37.5546,126.9706">서울역 (1, 4호선)</option>
            <option value="37.5088,126.8912">신도림역 (1, 2호선)</option>
            <option value="37.5133,127.1001">잠실역 (2, 8호선)</option>
            <option value="37.4842,126.9297">신림역 (2호선)</option>
            <option value="37.5802,127.0465">청량리역 (1호선)</option>
        </select>
        
        <button id="startBtn" class="btn btn-start" onclick="startTracking()">감시 시작 (1km 전 알람)</button>
        <button id="stopBtn" class="btn btn-stop" onclick="stopAlarm()">🚨 감시 종료 / 알람 끄기</button>
    </div>

    <script>
        let watchId = null;
        let targetLat = 0;
        let targetLng = 0;
        const ALARM_DISTANCE = 1000; 
        
        let audioCtx;
        let sirenInterval;
        let isAlarmPlaying = false;

        const distanceText = document.getElementById('distanceText');
        const statusTitle = document.getElementById('statusTitle');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const stationSelect = document.getElementById('stationSelect');
        const radarBox = document.getElementById('radarBox');

        function startTracking() {
            const selectedValue = stationSelect.value;
            if (!selectedValue) {
                return alert("목적지 지하철역을 먼저 선택해주세요!");
            }

            const coords = selectedValue.split(',');
            targetLat = parseFloat(coords[0]);
            targetLng = parseFloat(coords[1]);

            if (!navigator.geolocation) {
                return alert("스마트폰의 위치(GPS) 기능을 켜주세요.");
            }

            // 오디오 권한 승인
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // UI 상태 변경 (진짜 앱처럼 스무스하게)
            stationSelect.style.display = 'none';
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            stopBtn.innerText = "추적 중 (종료하기)";
            stopBtn.style.background = "#444";
            
            radarBox.classList.add('tracking');
            statusTitle.innerText = "GPS 스캔 중...";
            distanceText.classList.add('active');
            document.body.classList.remove('alarm-on');

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const currentLat = position.coords.latitude;
                    const currentLng = position.coords.longitude;
                    
                    const distance = calculateDistance(currentLat, currentLng, targetLat, targetLng);
                    
                    statusTitle.innerText = "도착까지 남은 거리";
                    distanceText.innerText = distance.toLocaleString() + " m";

                    // 💡 1km 이내 진입 시 알람 발동!
                    if (distance <= ALARM_DISTANCE) {
                        triggerAlarm();
                    }
                },
                (error) => {
                    statusTitle.innerText = "GPS 신호 탐색 중...";
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        // 거리 계산 공식 (미터)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180;
            const p2 = lat2 * Math.PI / 180;
            const dp = (lat2 - lat1) * Math.PI / 180;
            const dl = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(dp / 2) * Math.sin(dp / 2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) * Math.sin(dl / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return Math.floor(R * c); 
        }

        function triggerAlarm() {
            if (isAlarmPlaying) return;
            isAlarmPlaying = true;
            
            statusTitle.innerText = "🚨 1km 이내 진입! 🚨";
            distanceText.style.color = "var(--neon-red)";
            distanceText.style.textShadow = "0 0 20px var(--neon-red)";
            document.body.classList.add('alarm-on');
            
            stopBtn.innerText = "🚨 알람 끄기 🚨";
            stopBtn.style.background = "var(--neon-red)";
            radarBox.classList.remove('tracking');

            sirenInterval = setInterval(() => {
                if(!audioCtx) return;
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.type = 'sawtooth'; 
                osc.frequency.setValueAtTime(500, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.4); 
                
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4); 
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            }, 400); 
        }

        function stopAlarm() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            
            clearInterval(sirenInterval);
            isAlarmPlaying = false;
            
            // UI 초기화
            document.body.classList.remove('alarm-on');
            radarBox.classList.remove('tracking');
            distanceText.classList.remove('active');
            distanceText.style.color = "#fff";
            distanceText.style.textShadow = "0 0 20px rgba(255,255,255,0.3)";
            
            stationSelect.style.display = 'block';
            stationSelect.selectedIndex = 0; // 선택 초기화
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            
            distanceText.innerText = "--- m";
            statusTitle.innerText = "남은 거리";
        }
    </script>
</body>
</html>
