<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚨 목적지 사수 알람</title>
    <style>
        :root { --matrix-green: #39ff14; --neon-red: #ff003c; --bg-color: #0d0d0d; }
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); font-weight: normal; font-style: normal; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'DungGeunMo', sans-serif; background: var(--bg-color); color: #fff; display: flex; flex-direction: column; align-items: center; transition: background 0.1s; }
        
        /* 알람 울릴 때 화면 빨갛게 깜빡임 */
        body.alarm-on { animation: bloody-flash 0.5s infinite; }

        h1 { margin-top: 40px; color: var(--matrix-green); text-shadow: 0 0 10px var(--matrix-green); font-size: 2rem; text-align: center;}
        
        .status-box { background: #1a1a1a; border: 2px solid #333; border-radius: 15px; padding: 20px; width: 85%; max-width: 400px; text-align: center; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .status-box h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #aaa; }
        .distance-display { font-size: 3.5rem; color: #fff; font-weight: bold; margin: 10px 0; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        
        .input-group { display: flex; flex-direction: column; width: 85%; max-width: 400px; gap: 10px; margin-bottom: 20px; }
        input { padding: 15px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; font-size: 1rem; font-family: 'DungGeunMo'; text-align: center;}
        
        .btn { padding: 15px; border: none; border-radius: 10px; font-size: 1.2rem; font-family: 'DungGeunMo'; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-set { background: #333; color: #fff; border: 1px solid #555; }
        .btn-start { background: var(--matrix-green); color: #000; box-shadow: 0 0 15px rgba(57,255,20,0.5); margin-top: 10px;}
        .btn-stop { background: var(--neon-red); color: #fff; display: none; box-shadow: 0 0 15px rgba(255,0,60,0.5); margin-top: 10px;}
        
        .btn:active { transform: scale(0.95); }

        .log-box { width: 85%; max-width: 400px; height: 100px; background: #000; border: 1px solid var(--matrix-green); color: var(--matrix-green); padding: 10px; font-size: 0.8rem; overflow-y: auto; border-radius: 5px; margin-top: 20px; }

        @keyframes bloody-flash { 0%, 100% { background: var(--bg-color); } 50% { background: #5a0000; } }
    </style>
</head>
<body>

    <h1>지하철 기절 방지기</h1>

    <div class="status-box">
        <h2>목적지까지 남은 거리</h2>
        <div id="distanceText" class="distance-display">--- m</div>
        <p id="statusMsg" style="color: #888; font-size: 0.9rem;">대기 중...</p>
    </div>

    <div class="input-group">
        <input type="number" id="targetLat" placeholder="목적지 위도 (예: 37.5546)" value="37.5546">
        <input type="number" id="targetLng" placeholder="목적지 경도 (예: 126.9706)" value="126.9706">
        <button class="btn btn-set" onclick="setTestTarget()">내 현재 위치를 목적지로 (테스트용)</button>
        
        <button id="startBtn" class="btn btn-start" onclick="startTracking()">감시 시작 (1km 이내 알람)</button>
        <button id="stopBtn" class="btn btn-stop" onclick="stopAlarm()">🚨 알람 끄기 / 감시 종료</button>
    </div>

    <div class="log-box" id="logBox">시스템 대기중...<br></div>

    <script>
        let watchId = null;
        let targetLat = 0;
        let targetLng = 0;
        const ALARM_DISTANCE = 1000; // 1000미터(1km) 이내 진입 시 알람
        
        // 오디오 관련 변수
        let audioCtx;
        let sirenInterval;
        let isAlarmPlaying = false;

        const logBox = document.getElementById('logBox');
        const distanceText = document.getElementById('distanceText');
        const statusMsg = document.getElementById('statusMsg');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        function log(msg) {
            logBox.innerHTML = msg + "<br>" + logBox.innerHTML;
        }

        // 테스트를 위해 내 현재 위치를 바로 목적지로 설정하는 기능 (바로 알람 울리게)
        function setTestTarget() {
            if (!navigator.geolocation) return alert("이 브라우저는 위치 추적을 지원하지 않습니다.");
            
            navigator.geolocation.getCurrentPosition((pos) => {
                document.getElementById('targetLat').value = pos.coords.latitude;
                document.getElementById('targetLng').value = pos.coords.longitude;
                log("테스트용: 현재 위치를 목적지로 설정 완료!");
            }, (err) => {
                alert("위치 정보를 가져올 수 없습니다. 권한을 확인해주세요.");
            });
        }

        function startTracking() {
            targetLat = parseFloat(document.getElementById('targetLat').value);
            targetLng = parseFloat(document.getElementById('targetLng').value);

            if (isNaN(targetLat) || isNaN(targetLng)) {
                return alert("정확한 목적지 위도/경도를 입력해주세요!");
            }

            if (!navigator.geolocation) {
                return alert("이 브라우저는 위치 추적을 지원하지 않습니다.");
            }

            // 오디오 컨텍스트 초기화 (사용자가 버튼을 눌렀을 때 초기화해야 브라우저 정책상 소리가 남)
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            stopBtn.innerText = "감시 종료 (추적 중...)";
            stopBtn.style.background = "#555";
            statusMsg.innerText = "🛰️ GPS 추적 및 거리 계산 중...";
            statusMsg.style.color = "var(--matrix-green)";
            document.body.classList.remove('alarm-on');

            log(`목적지 설정됨: ${targetLat.toFixed(4)}, ${targetLng.toFixed(4)}`);

            // 실시간 위치 추적 시작
            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const currentLat = position.coords.latitude;
                    const currentLng = position.coords.longitude;
                    
                    // 남은 거리 계산 (미터 단위)
                    const distance = calculateDistance(currentLat, currentLng, targetLat, targetLng);
                    distanceText.innerText = distance.toLocaleString() + " m";
                    log(`현재 위치 갱신됨. 남은 거리: ${distance}m`);

                    // 설정 거리 이내로 진입 시 알람!
                    if (distance <= ALARM_DISTANCE) {
                        triggerAlarm();
                    }
                },
                (error) => {
                    log(`GPS 에러: ${error.message}`);
                    statusMsg.innerText = "GPS 신호를 찾는 중...";
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        // 지구 둥근 거 감안해서 위도/경도로 정확한 미터(m) 거리 구하는 공식 (Haversine formula)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // 지구 반지름 (미터)
            const p1 = lat1 * Math.PI / 180;
            const p2 = lat2 * Math.PI / 180;
            const dp = (lat2 - lat1) * Math.PI / 180;
            const dl = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(dp / 2) * Math.sin(dp / 2) +
                      Math.cos(p1) * Math.cos(p2) *
                      Math.sin(dl / 2) * Math.sin(dl / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return Math.floor(R * c); 
        }

        function triggerAlarm() {
            if (isAlarmPlaying) return; // 이미 울리고 있으면 무시
            isAlarmPlaying = true;
            
            statusMsg.innerText = "🚨 1km 이내 진입! 당장 내리십쇼!! 🚨";
            statusMsg.style.color = "var(--neon-red)";
            document.body.classList.add('alarm-on');
            
            stopBtn.innerText = "🚨 알람 끄기 🚨";
            stopBtn.style.background = "var(--neon-red)";

            // 100% 코드로 깎아 만든 사이렌 소리 발생기
            sirenInterval = setInterval(() => {
                if(!audioCtx) return;
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.type = 'sawtooth'; // 찢어지는 듯한 사이렌 파형
                osc.frequency.setValueAtTime(400, audioCtx.currentTime); // 낮은음에서 시작
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5); // 높은음으로 쫙 올라감
                
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5); // 소리 서서히 줄어듦
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }, 500); // 0.5초마다 반복
        }

        function stopAlarm() {
            // 위치 추적기 끄기
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            
            // 사이렌 끄기
            clearInterval(sirenInterval);
            isAlarmPlaying = false;
            document.body.classList.remove('alarm-on');
            
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            distanceText.innerText = "--- m";
            statusMsg.innerText = "대기 중...";
            statusMsg.style.color = "#888";
            log("추적 및 알람이 종료되었습니다.");
        }
    </script>
</body>
</html>
